name: Validate atlas data

on:
  pull_request:
  push:
    branches: [main, codex/neurocell-model-atlas]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/validate_catalogue.py
      - run: python scripts/build_tables.py
      - run: git diff --exit-code -- models/model_catalog.json models/model_catalog.yaml
      - run: python scripts/validate_references.py
      - run: python scripts/validate_links.py
      - run: python scripts/validate_language.py
