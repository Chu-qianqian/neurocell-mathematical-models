name: Validate atlas data

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --disable-pip-version-check -r requirements-brian2.txt
      - run: python scripts/validate_catalogue.py
      - run: python scripts/build_tables.py
      - run: git diff --exit-code -- README.md equations/README.md models/model_catalog.json models/model_catalog.yaml references/references.csv references/references.bib
      - run: python scripts/validate_references.py
      - run: python scripts/validate_equations.py
      - run: python scripts/validate_links.py
      - run: python scripts/validate_language.py
      - run: python -m unittest discover -s tests -v
      - run: git diff --check
